<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="100%" height="100%">
  <defs>
    <linearGradient id="brandGradient" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7c3aed" />
      <stop offset="100%" stop-color="#4f46e5" />
    </linearGradient>
    
    <filter id="brandShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="15" flood-color="#7c3aed" flood-opacity="0.3" />
    </filter>
  </defs>

  <rect 
    x="4" 
    y="4" 
    width="72" 
    height="72" 
    rx="16" 
    fill="url(#brandGradient)" 
    filter="url(#brandShadow)"
  />

  <text 
    x="40" 
    y="54" 
    font-family="system-ui, -apple-system, sans-serif" 
    font-size="40" 
    font-weight="900" 
    fill="#ffffff" 
    text-anchor="middle"
    transform="skewX(-3) translate(2, 0)"
    style="user-select: none;"
  >
    B
  </text>

  <circle cx="64" cy="16" r="6" fill="#ffffff">
    <animate 
      attributeName="opacity" 
      values="1;0.4;1" 
      dur="2s" 
      repeatCount="indefinite" 
    />
  </circle>
</svg>
